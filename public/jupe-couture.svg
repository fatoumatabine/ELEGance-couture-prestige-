<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600">
  <defs>
    <pattern id="pattern" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="20" y2="20" stroke="#8B6914" stroke-width="1" opacity="0.3"/>
    </pattern>
  </defs>
  <rect width="400" height="600" fill="#F5E6D3"/>
  <!-- Waist -->
  <ellipse cx="200" cy="100" rx="80" ry="30" fill="#C9A424" stroke="#8B6914" stroke-width="2"/>
  <!-- Skirt -->
  <path d="M 120 130 Q 100 250 80 500 Q 80 550 200 550 Q 320 550 320 500 Q 300 250 280 130 Z" fill="#E8C547" stroke="#8B6914" stroke-width="2"/>
  <!-- Pattern overlay -->
  <path d="M 120 130 Q 100 250 80 500 Q 80 550 200 550 Q 320 550 320 500 Q 300 250 280 130 Z" fill="url(#pattern)"/>
  <!-- Pleat lines -->
  <line x1="160" y1="130" x2="150" y2="500" stroke="#8B6914" stroke-width="1" opacity="0.5"/>
  <line x1="240" y1="130" x2="250" y2="500" stroke="#8B6914" stroke-width="1" opacity="0.5"/>
</svg>
