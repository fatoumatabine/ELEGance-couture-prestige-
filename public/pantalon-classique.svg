<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600">
  <rect width="400" height="600" fill="#F5E6D3"/>
  <!-- Waist -->
  <ellipse cx="200" cy="100" rx="70" ry="28" fill="#3D3D3D" stroke="#1A1A1A" stroke-width="2"/>
  <!-- Belt -->
  <rect x="150" y="95" width="100" height="15" fill="#8B6914" stroke="#5D4C0A" stroke-width="1"/>
  <!-- Left leg -->
  <path d="M 180 125 L 175 500 Q 175 550 190 550 L 210 550 Q 210 500 205 125 Z" fill="#3D3D3D" stroke="#1A1A1A" stroke-width="2"/>
  <!-- Right leg -->
  <path d="M 220 125 L 215 125 Q 200 500 195 550 L 210 550 Q 225 500 230 125 Z" fill="#4D4D4D" stroke="#1A1A1A" stroke-width="2"/>
  <!-- Crease lines -->
  <line x1="190" y1="130" x2="185" y2="500" stroke="#1A1A1A" stroke-width="1" opacity="0.3"/>
  <line x1="210" y1="130" x2="215" y2="500" stroke="#1A1A1A" stroke-width="1" opacity="0.3"/>
</svg>
